spring:
  application:
    name: document-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/knowledgevault}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

  security:
    jwt:
      secret: ${JWT_SECRET:development-only-jwt-key-change-me-minimum-256-bits}
      expiration: ${JWT_EXPIRATION:86400000} # 24 hours in milliseconds

app:
  environment: ${ENVIRONMENT:development}

ai-service:
  base-url: ${AI_SERVICE_BASE_URL:http://ai-service:8000}
  internal-api-key: ${INTERNAL_API_KEY:development-only-change-me}
  internal-api-key-header: ${AI_SERVICE_INTERNAL_API_KEY_HEADER:Authorization}
  embedding-model: ${AI_SERVICE_EMBEDDING_MODEL:}
  llm-model: ${AI_SERVICE_LLM_MODEL:}
  connect-timeout-ms: ${AI_SERVICE_CONNECT_TIMEOUT_MS:3000}
  read-timeout-ms: ${AI_SERVICE_READ_TIMEOUT_MS:30000}

ingestion:
  embedding:
    enabled: ${INGESTION_EMBEDDING_ENABLED:true}
    provider: ${INGESTION_EMBEDDING_PROVIDER:ai-service}
    model-name: ${INGESTION_EMBEDDING_MODEL_NAME:nomic-embed-text}
    model-version: ${INGESTION_EMBEDDING_MODEL_VERSION:}
    dimension: ${INGESTION_EMBEDDING_DIMENSION:768}
    batch-size: ${INGESTION_EMBEDDING_BATCH_SIZE:16}
    timeout-ms: ${INGESTION_EMBEDDING_TIMEOUT_MS:30000}

semantic-retrieval:
  top-k: ${SEMANTIC_RETRIEVAL_TOP_K:5}

rag:
  prompt:
    max-context-tokens: ${RAG_PROMPT_MAX_CONTEXT_TOKENS:2000}
  chunking:
    enabled: ${INGESTION_CHUNKING_ENABLED:true}
    chunk-size: ${INGESTION_CHUNKING_SIZE:1000}
    overlap: ${INGESTION_CHUNKING_OVERLAP:200}
  ocr:
    enabled: ${INGESTION_OCR_ENABLED:true}
    low-text-threshold: ${INGESTION_OCR_LOW_TEXT_THRESHOLD:20}
    render-dpi: ${INGESTION_OCR_RENDER_DPI:300}
    image-format: ${INGESTION_OCR_IMAGE_FORMAT:png}
    languages: ${INGESTION_OCR_LANGUAGES:eng}
  worker:
    enabled: ${INGESTION_WORKER_ENABLED:false}
    batch-size: ${INGESTION_WORKER_BATCH_SIZE:5}
    max-attempts: ${INGESTION_WORKER_MAX_ATTEMPTS:3}
    fixed-delay: ${INGESTION_WORKER_FIXED_DELAY:PT30S}
    initial-delay: ${INGESTION_WORKER_INITIAL_DELAY:PT10S}
    stale-threshold: ${INGESTION_WORKER_STALE_THRESHOLD:PT10M}
    retry-initial-delay: ${INGESTION_WORKER_RETRY_INITIAL_DELAY:PT30S}
    retry-backoff-multiplier: ${INGESTION_WORKER_RETRY_BACKOFF_MULTIPLIER:2.0}
    retry-max-delay: ${INGESTION_WORKER_RETRY_MAX_DELAY:PT15M}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

# File storage configuration
file-storage:
  base-path: ${FILE_STORAGE_BASE_PATH:/app/storage/documents}
  max-file-size: ${FILE_STORAGE_MAX_SIZE:52428800}
  allowed-types:
    - application/pdf
    - application/vnd.openxmlformats-officedocument.wordprocessingml.document
    - text/plain
    - text/html
    - text/csv
    - text/markdown

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

logging:
  level:
    com.kva.document_service: DEBUG
    org.springframework.security: DEBUG
    org.flywaydb: DEBUG
