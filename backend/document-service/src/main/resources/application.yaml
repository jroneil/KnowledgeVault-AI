spring:
  application:
    name: document-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/knowledgevault}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

  security:
    jwt:
      secret: ${JWT_SECRET:KnowledgeVault-AI-Secret-Key-Change-In-Production-Min-256-Bits}
      expiration: ${JWT_EXPIRATION:86400000} # 24 hours in milliseconds

# File storage configuration
file-storage:
  base-path: ${FILE_STORAGE_BASE_PATH:/app/storage/documents}
  max-file-size: ${FILE_STORAGE_MAX_SIZE:52428800}
  allowed-types:
    - application/pdf
    - application/vnd.openxmlformats-officedocument.wordprocessingml.document
    - text/plain
    - text/html
    - text/csv
    - text/markdown

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

logging:
  level:
    com.kva.document_service: DEBUG
    org.springframework.security: DEBUG
    org.flywaydb: DEBUG
