services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: knowledgevault-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-knowledgevault}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - knowledgevault-network

  backend:
    build:
      context: ./backend/document-service
      dockerfile: Dockerfile
    container_name: knowledgevault-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-knowledgevault}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-development-only-jwt-key-change-me-minimum-256-bits}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      AI_SERVICE_BASE_URL: http://ai-service:8000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-development-only-change-me}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - storage_data:/app/storage
    networks:
      - knowledgevault-network
    restart: unless-stopped

  # pgAdmin for database inspection
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: knowledgevault-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@knowledgevault.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_LISTEN_PORT: 80
      PGADMIN_LISTEN_ADDRESS: 0.0.0.0
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - knowledgevault-network
    restart: unless-stopped

  # Redis for distributed caching
  redis:
    image: redis:7-alpine
    container_name: knowledgevault-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
      - ./scripts:/scripts:ro
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - knowledgevault-network
    restart: unless-stopped

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: knowledgevault-ai
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-knowledgevault}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-768}
      OLLAMA_LLM_MODEL: ${OLLAMA_LLM_MODEL:-qwen2:7b}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-development-only-change-me}
      CORS_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      REDIS_URL: redis://redis:6379/0
      REDIS_TTL: ${REDIS_TTL:-3600}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - storage_data:/app/storage
    networks:
      - knowledgevault-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend/knowledgevault-ui
      dockerfile: Dockerfile
    container_name: knowledgevault-frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_INTERNAL_URL: http://backend:8080
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/login || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - knowledgevault-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  storage_data:
    driver: local
  redis_data:
    driver: local

networks:
  knowledgevault-network:
    driver: bridge
