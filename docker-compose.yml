services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: knowledgevault-db
    environment:
      POSTGRES_DB: knowledgevault
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - knowledgevault-network

  backend:
    build:
      context: ./backend/document-service
      dockerfile: Dockerfile
    container_name: knowledgevault-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/knowledgevault
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: KnowledgeVault-AI-Secret-Key-Change-In-Production-Min-256-Bits
      JWT_EXPIRATION: 86400000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - storage_data:/app/storage
    networks:
      - knowledgevault-network
    restart: unless-stopped

  # pgAdmin for database inspection
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: knowledgevault-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@knowledgevault.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_LISTEN_PORT: 80
      PGADMIN_LISTEN_ADDRESS: 0.0.0.0
    ports:
      - "8081:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - knowledgevault-network
    restart: unless-stopped

  # Redis for distributed caching
  redis:
    image: redis:7-alpine
    container_name: knowledgevault-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./scripts:/scripts:ro
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - knowledgevault-network
    restart: unless-stopped

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: knowledgevault-ai
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/knowledgevault
      OLLAMA_BASE_URL: http://192.168.1.24:11434
      INTERNAL_API_KEY: 9XfK2mQ7vLp8Rz4NcT1wHy6BjDs3UaEe
      REDIS_URL: redis://redis:6379/0
      REDIS_TTL: 3600
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - storage_data:/app/storage
    networks:
      - knowledgevault-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend/knowledgevault-ui
      dockerfile: Dockerfile
    container_name: knowledgevault-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - knowledgevault-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  storage_data:
    driver: local
  redis_data:
    driver: local

networks:
  knowledgevault-network:
    driver: bridge
